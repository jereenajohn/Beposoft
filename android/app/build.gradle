plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

android {
    namespace "com.bepositive.beposoft"
    compileSdk 36

    // Required for 16 KB page support
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.bepositive.beposoft"
        minSdkVersion flutter.minSdkVersion
        targetSdk 36

        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        multiDexEnabled true

         ndk {
        abiFilters "armeabi-v7a", "arm64-v8a"
    }

        manifestPlaceholders = [
                flutter_deferred_component_loading: "false",
                applicationName: "android.app.Application"
        ]
        

      
    }

    signingConfigs {
        release {
            storeFile file('G:/beposoft 17-09-2025/beposoft/upload-keystore.jks')
            storePassword 'beposoft@123'
            keyAlias 'upload'
            keyPassword 'beposoft@123'
        }
    }

    buildTypes {
    release {
        signingConfig signingConfigs.release

        minifyEnabled false
        shrinkResources false

        proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
    }
}


    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }
        pickFirst '**/*.so'
    }

    lint {
        abortOnError = false
        checkReleaseBuilds = false
    }
}

flutter {
    source '../..'
}
dependencies {
    implementation "androidx.core:core-ktx:1.10.1"
    implementation "androidx.multidex:multidex:2.0.1"
    implementation "androidx.activity:activity-ktx:1.8.2"
    implementation "androidx.fragment:fragment-ktx:1.6.2"

}
